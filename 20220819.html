<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ======= Contact Section ======= -->
    <section id="contact" class="contact section-bg">
        <div class="container">
  
          <div class="section-title">
            <h2>CONTACT</h2>
            <p>If you want to know more about related products and project cooperation, or have any valuable opinions about us, you are welcome to contact us, and we will serve you wholeheartedly!</p>
          </div>
  
          <div class="row">
  
            <div class="col-lg-4 map-bg">
            </div>
  
            <div class="col-lg-8 mt-5 mt-lg-0">
  
              <form action="https://www.high-honest.net/forms/contact.php" method="post" role="form" class="php-email-form" data-aos="fade-left">
                <div class="form-row">
                  <div class="col-md-6 form-group">
                    <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" data-rule="minlen:4" data-msg="Please enter at least 4 chars" />
                    <div class="validate"></div>
                  </div>
                  <div class="col-md-6 form-group">
                    <input type="email" class="form-control" name="email" id="email" placeholder="Your Email" data-rule="email" data-msg="Please enter a valid email" />
                    <div class="validate"></div>
                  </div>
                </div>
                <div class="form-group">
                  <input type="text" class="form-control" name="subject" id="subject" placeholder="Subject" data-rule="minlen:4" data-msg="Please enter at least 8 chars of subject" />
                  <div class="validate"></div>
                </div>
                <div class="form-group">
                  <textarea class="form-control" name="message" rows="5" data-rule="required" data-msg="Please write something for us" placeholder="Message"></textarea>
                  <div class="validate"></div>
                </div>
                <div class="mb-3">
                  <div class="loading">Loading</div>
                  <div class="error-message"></div>
                  <div class="sent-message">Your message has been sent. Thank you!</div>
                </div>
                <div class="text-center"><button type="submit" style="border: 0;outline:none">Send Message</button></div>
              </form>
  
            </div>
  
          </div>
  
        </div>
      </section><!-- End Contact Section -->

      <div class="row footer-newsletter justify-content-center">
        <div class="col-lg-6">
          <form action="#" method="post" role="form" onsubmit="return returnMsg();">
            <input type="text" id="emailSubscribe" name="email" placeholder="Enter your Email" style="border: 0;width: 65%;outline:none;"><input type="submit" value="Subscribe" style="border: 0;outline:none">
          </form>
        </div>
        <div class="validateSubscribe col-lg-12" style="display: none;color: red;">Please enter a valid email</div>
        <div class="messageSubscribe col-lg-12" style="display: none;color: #ffce05;">You have subscribed. Thank you!</div>
      </div>
</body>
</html>
